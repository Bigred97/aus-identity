name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Run ruff check
        run: uvx "ruff>=0.5" check src/ tests/

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - run: uv sync --extra dev
      - run: uv pip install -e .
      - run: uv run pytest -q

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
      - name: Build wheel + sdist
        run: uv build
      - name: Verify wheel installs cleanly
        run: |
          uv run --isolated --with ./dist/*.whl python -c \
            "from aus_identity import postcode_to_state, normalize_state; \
             assert postcode_to_state('2000') == 'NSW'; \
             assert normalize_state('Tassie') == 'TAS'; \
             print('OK')"
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
